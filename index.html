<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일본어 동사 500</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg1: #e0f7ff;
      --bg2: #f8fdff;
      --card: rgba(255,255,255,.93);
      --line: #bae6fd;
      --line-strong: #7dd3fc;
      --blue: #0ea5e9;
      --blue-dark: #0369a1;
      --text: #0f172a;
      --muted: #64748b;
      --soft: #f0f9ff;
      --yellow: #ffe16a;
      --shadow: 0 10px 24px rgba(14, 116, 144, .08);
    }
    body {
      min-width: 340px;
      margin: 0;
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 54%, #eef9ff 100%);
      color: var(--text);
      font-family: "Pretendard", "Noto Sans KR", "Noto Sans JP", "Hiragino Sans", "Yu Gothic", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input { font-family: inherit; }
    button { border: 0; cursor: pointer; }
    .app {
      width: min(100%, 520px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 18px 16px 34px;
      background: linear-gradient(180deg, #f8fdff 0%, #eef9ff 100%);
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .title-wrap { min-width: 0; }
    h1 {
      margin: 0;
      color: var(--blue-dark);
      font-size: clamp(34px, 9vw, 44px);
      line-height: .98;
      font-weight: 800;
      letter-spacing: -0.07em;
      word-break: keep-all;
    }
    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: -0.03em;
    }
    .counter {
      flex: 0 0 auto;
      min-width: 84px;
      padding: 10px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.82);
      color: #111827;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      box-shadow: none;
    }
    .search {
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      margin-bottom: 13px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,.96);
      box-shadow: var(--shadow);
      cursor: text;
    }
    .search:focus-within {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(14,165,233,.14), var(--shadow);
    }
    .search-icon-btn,
    .search-clear-btn {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: transparent;
      color: var(--blue-dark);
      font-size: 22px;
      line-height: 1;
      box-shadow: none;
    }
    .search-clear-btn {
      display: none;
      background: #e0f2fe;
      color: #475569;
      font-size: 24px;
    }
    .search-clear-btn.show { display: inline-flex; }
    #searchInput {
      flex: 1 1 auto;
      min-width: 0;
      width: 100%;
      height: 38px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      caret-color: var(--blue);
      font-size: 17px;
      line-height: 1.2;
      font-weight: 400;
      letter-spacing: -0.03em;
      -webkit-appearance: none;
      appearance: none;
    }
    #searchInput::placeholder { color: var(--muted); opacity: 1; }
    #searchInput::-webkit-search-decoration,
    #searchInput::-webkit-search-cancel-button,
    #searchInput::-webkit-search-results-button,
    #searchInput::-webkit-search-results-decoration { display: none; }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 0 0 11px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.86);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .summary strong { color: var(--blue-dark); font-weight: 800; }
    .list {
      display: grid;
      gap: 12px;
    }
    .verb-card {
      padding: 15px 14px 14px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
    }
    .card-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      margin-bottom: 11px;
    }
    .no {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #e0f2fe;
      color: var(--blue-dark);
      font-size: 12px;
      font-weight: 800;
    }
    .meaning {
      margin: 0;
      color: var(--text);
      font-size: 17px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    .hint {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }
    .forms {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .form-cell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 13px 12px;
      border: 1px solid #d7effc;
      border-radius: 18px;
      background: #ffffff;
    }
    .label {
      display: inline-flex;
      width: max-content;
      margin-bottom: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--blue-dark);
      font-size: 11px;
      line-height: 1;
      font-weight: 800;
    }
    .jp {
      margin: 0;
      color: #111827;
      font-size: 23px;
      line-height: 1.15;
      font-weight: 650;
      letter-spacing: -0.04em;
      font-kerning: none;
      word-break: keep-all;
    }
    .kana {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
      font-weight: 500;
      letter-spacing: -0.03em;
    }
    .sound {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line-strong);
      border-radius: 50%;
      background: #e0f2fe;
      color: var(--blue-dark);
      font-size: 19px;
      box-shadow: none;
    }
    .sound:active { transform: scale(.96); }
    .empty {
      display: none;
      padding: 46px 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,.92);
      text-align: center;
      color: var(--muted);
      box-shadow: var(--shadow);
    }
    .empty.show { display: block; }
    .empty strong {
      display: block;
      margin: 8px 0 5px;
      color: var(--text);
      font-size: 18px;
    }
    .footer {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.86);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      letter-spacing: -0.02em;
    }
    .highlight {
      background: linear-gradient(transparent 60%, rgba(255,225,106,.62) 60%);
      border-radius: 4px;
    }
    @media (min-width: 440px) {
      .forms {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .form-cell {
        min-height: 150px;
        grid-template-columns: 1fr;
        align-content: space-between;
      }
      .sound {
        justify-self: end;
      }
      .jp {
        font-size: 21px;
      }
    }
    @media (max-width: 380px) {
      .app { padding: 15px 12px 28px; }
      .counter { min-width: 74px; padding: 9px 10px; font-size: 14px; }
      .search { min-height: 54px; border-radius: 20px; }
      #searchInput { font-size: 16px; }
      .verb-card { padding: 13px 12px; border-radius: 20px; }
      .jp { font-size: 21px; }
    }
  

    /* ===== v3 요청 반영: 전체 보통 굵기 + 일본어/히라가나 확대 ===== */
    body,
    body * {
      font-weight: 400 !important;
    }

    .form-cell {
      cursor: pointer !important;
    }

    .jp {
      font-size: 30px !important;
      line-height: 1.17 !important;
      font-weight: 400 !important;
      letter-spacing: -0.045em !important;
    }

    .kana {
      font-size: 17px !important;
      line-height: 1.28 !important;
      font-weight: 400 !important;
      margin-top: 6px !important;
      letter-spacing: -0.025em !important;
    }

    @media (min-width: 440px) {
      .jp {
        font-size: 27px !important;
      }
      .kana {
        font-size: 16px !important;
      }
    }

    @media (max-width: 380px) {
      .jp {
        font-size: 28px !important;
      }
      .kana {
        font-size: 16px !important;
      }
    }

  

    /* ===== v4: 히라가나를 일본어 위에 표시 + 전체 굵기 노멀 ===== */
    * {
      font-weight: 400 !important;
    }
    strong, b, h1, .meaning, .label, .no, .counter, .summary strong {
      font-weight: 400 !important;
    }
    h1 {
      font-size: clamp(36px, 9.5vw, 46px) !important;
      letter-spacing: -0.055em !important;
    }
    .meaning {
      font-size: 18px !important;
      line-height: 1.28 !important;
    }
    .hint {
      display: flex !important;
      flex-direction: column !important;
      gap: 2px !important;
      margin-top: 5px !important;
    }
    .head-kana {
      display: block !important;
      color: #64748b !important;
      font-size: 16px !important;
      line-height: 1.08 !important;
      letter-spacing: -0.03em !important;
    }
    .head-jp {
      display: block !important;
      color: #334155 !important;
      font-size: 18px !important;
      line-height: 1.1 !important;
      letter-spacing: -0.04em !important;
    }
    .form-cell {
      align-items: stretch !important;
      padding: 15px 13px 16px !important;
      cursor: pointer !important;
    }
    .label {
      margin-bottom: 9px !important;
      font-size: 12px !important;
    }
    .kana,
    .kana-top {
      display: block !important;
      margin: 0 0 6px !important;
      color: #64748b !important;
      font-size: 18px !important;
      line-height: 1.12 !important;
      letter-spacing: -0.025em !important;
    }
    .jp {
      margin: 0 !important;
      color: #0f172a !important;
      font-size: 30px !important;
      line-height: 1.12 !important;
      letter-spacing: -0.045em !important;
    }
    @media (min-width: 440px) {
      .form-cell {
        min-height: 166px !important;
        padding: 17px 13px 18px !important;
      }
      .kana,
      .kana-top {
        font-size: 18px !important;
        margin-bottom: 7px !important;
      }
      .jp {
        font-size: 31px !important;
      }
    }
    @media (max-width: 380px) {
      .kana,
      .kana-top {
        font-size: 16px !important;
      }
      .jp {
        font-size: 27px !important;
      }
      .head-kana { font-size: 15px !important; }
      .head-jp { font-size: 17px !important; }
    }


    /* ===== v5: 첨부 예시처럼 히라가나를 일본어 위에 배치 ===== */
    body,
    body * {
      font-weight: 400 !important;
    }

    .verb-card {
      padding: 16px 14px 15px !important;
      border-radius: 22px !important;
      background: rgba(255,255,255,.95) !important;
      box-shadow: 0 8px 20px rgba(14, 116, 144, .06) !important;
    }

    .card-head {
      display: block !important;
      margin: 0 0 12px !important;
    }

    .main-word-wrap {
      position: relative !important;
      display: block !important;
      padding: 2px 2px 0 !important;
      cursor: pointer !important;
    }

    .main-ruby,
    .form-ruby {
      ruby-position: over !important;
      -webkit-ruby-position: before !important;
    }

    .main-ruby rt,
    .form-ruby rt {
      color: #64748b !important;
      font-weight: 400 !important;
      letter-spacing: -0.04em !important;
      text-align: center !important;
    }

    .main-ruby rt {
      font-size: 18px !important;
      line-height: 1 !important;
    }

    .main-rb {
      display: inline-block !important;
      margin-top: 2px !important;
      color: #0f172a !important;
      font-size: 39px !important;
      line-height: 1.06 !important;
      font-weight: 400 !important;
      letter-spacing: -0.055em !important;
      font-kerning: none !important;
      font-feature-settings: "palt" 1 !important;
      font-variant-east-asian: proportional-width !important;
    }

    .card-meta {
      display: flex !important;
      align-items: center !important;
      gap: 7px !important;
      margin-top: 6px !important;
      color: #64748b !important;
      font-size: 13px !important;
      line-height: 1.25 !important;
      letter-spacing: -0.03em !important;
    }

    .card-no {
      color: #94a3b8 !important;
    }

    .card-meaning {
      color: #334155 !important;
    }

    .forms {
      display: grid !important;
      grid-template-columns: 1fr !important;
      gap: 8px !important;
      padding: 12px 11px !important;
      border: 1px solid #d7effc !important;
      border-radius: 19px !important;
      background: #f8fdff !important;
    }

    .form-cell {
      display: block !important;
      min-height: auto !important;
      padding: 11px 12px 12px !important;
      border: 1px solid #e0f2fe !important;
      border-radius: 15px !important;
      background: #ffffff !important;
      cursor: pointer !important;
    }

    .form-cell:active,
    .main-word-wrap:active {
      transform: scale(.99) !important;
    }

    .label {
      display: block !important;
      width: auto !important;
      margin: 0 0 8px !important;
      padding: 0 !important;
      border-radius: 0 !important;
      background: transparent !important;
      color: #64748b !important;
      font-size: 12px !important;
      line-height: 1.1 !important;
      letter-spacing: -0.03em !important;
      font-weight: 400 !important;
    }

    .form-ruby rt {
      font-size: 17px !important;
      line-height: 1 !important;
    }

    .form-rb {
      display: inline-block !important;
      color: #0f172a !important;
      font-size: 31px !important;
      line-height: 1.08 !important;
      font-weight: 400 !important;
      letter-spacing: -0.05em !important;
      font-kerning: none !important;
      font-feature-settings: "palt" 1 !important;
      font-variant-east-asian: proportional-width !important;
      word-break: keep-all !important;
    }

    .highlight {
      background: #fff7cc !important;
      border-radius: 5px !important;
      padding: 0 .03em !important;
    }

    @media (min-width: 440px) {
      .main-rb { font-size: 40px !important; }
      .main-ruby rt { font-size: 19px !important; }
      .form-rb { font-size: 32px !important; }
      .form-ruby rt { font-size: 18px !important; }
    }

    @media (max-width: 380px) {
      .verb-card { padding: 15px 13px 14px !important; }
      .main-rb { font-size: 36px !important; }
      .main-ruby rt { font-size: 17px !important; }
      .form-rb { font-size: 28px !important; }
      .form-ruby rt { font-size: 16px !important; }
      .forms { padding: 11px 10px !important; }
    }


    /* ===== v7: 동사 그룹 표시 ===== */
    .group-pill {
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      padding: 4px 8px !important;
      border: 1px solid #bae6fd !important;
      border-radius: 999px !important;
      background: #eef9ff !important;
      color: #0369a1 !important;
      font-size: 12px !important;
      line-height: 1 !important;
      letter-spacing: -0.03em !important;
      white-space: nowrap !important;
      font-weight: 400 !important;
    }
    .group-1 { background: #eff6ff !important; color: #1d4ed8 !important; border-color: #bfdbfe !important; }
    .group-2 { background: #f0fdf4 !important; color: #15803d !important; border-color: #bbf7d0 !important; }
    .group-3 { background: #fff7ed !important; color: #c2410c !important; border-color: #fed7aa !important; }
    .card-meta {
      flex-wrap: wrap !important;
    }

  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="title-wrap">
        <h1>일본어 동사 500</h1>
        <p class="sub">검색 후 기본형·ます형·부정형을 한 칸에서 확인합니다. 히라가나는 한자 위에만 표시되고, 칸을 누르면 발음이 나옵니다.</p>
      </div>
      <div class="counter" id="topCounter">500개</div>
    </header>

    <section class="search" id="searchBox" aria-label="동사 검색">
      <button type="button" class="search-icon-btn" id="searchIconBtn" aria-label="검색창 활성화">🔎</button>
      <input id="searchInput" type="search" autocomplete="off" inputmode="search" placeholder="동사 / 히라가나 / 뜻 검색" />
      <button type="button" class="search-clear-btn" id="searchClearBtn" aria-label="검색어 지우기">×</button>
    </section>

    <div class="summary">
      <span id="resultText">검색 결과 <strong>500</strong> / 500</span>
      <span>히라가나 위 표시 · 그룹 구분 · 칸 터치 발음</span>
    </div>

    <main>
      <div class="empty" id="emptyBox">🔎<strong>검색 결과가 없습니다.</strong><span>동사, 히라가나, 뜻을 다시 입력해 주세요.</span></div>
      <div class="list" id="verbList"></div>
    </main>

    <footer class="footer">
      검색 중심 카드만 남겼습니다. 각 단어는 1그룹·2그룹·3그룹동사로 구분되며, 칸을 누르면 브라우저의 일본어 음성 합성으로 발음이 재생됩니다.
    </footer>
  </div>

"base":{"text":"切断する","kana":"せつだんする"},"masu":{"text":"切断します","kana":"せつだんします"},"negative":{"text":"切断しない","kana":"せつだんしない"}},{"id":490,"meaning":"재시작하다","group":"suru","base":{"text":"再起動する","kana":"さいきどうする"},"masu":{"text":"再起動します","kana":"さいきどうします"},"negative":{"text":"再起動しない","kana":"さいきどうしない"}},{"id":491,"meaning":"실행하다","group":"suru","base":{"text":"起動する","kana":"きどうする"},"masu":{"text":"起動します","kana":"きどうします"},"negative":{"text":"起動しない","kana":"きどうしない"}},{"id":492,"meaning":"종료하다","group":"suru","base":{"text":"終了する","kana":"しゅうりょうする"},"masu":{"text":"終了します","kana":"しゅうりょうします"},"negative":{"text":"終了しない","kana":"しゅうりょうしない"}},{"id":493,"meaning":"개시하다","group":"suru","base":{"text":"開始する","kana":"かいしする"},"masu":{"text":"開始します","kana":"かいしします"},"negative":{"text":"開始しない","kana":"かいししない"}},{"id":494,"meaning":"재개하다","group":"suru","base":{"text":"再開する","kana":"さいかいする"},"masu":{"text":"再開します","kana":"さいかいします"},"negative":{"text":"再開しない","kana":"さいかいしない"}},{"id":495,"meaning":"정지하다","group":"suru","base":{"text":"停止する","kana":"ていしする"},"masu":{"text":"停止します","kana":"ていしします"},"negative":{"text":"停止しない","kana":"ていししない"}},{"id":496,"meaning":"중지하다","group":"suru","base":{"text":"中止する","kana":"ちゅうしする"},"masu":{"text":"中止します","kana":"ちゅうしします"},"negative":{"text":"中止しない","kana":"ちゅうししない"}},{"id":497,"meaning":"완료하다","group":"suru","base":{"text":"完了する","kana":"かんりょうする"},"masu":{"text":"完了します","kana":"かんりょうします"},"negative":{"text":"完了しない","kana":"かんりょうしない"}},{"id":498,"meaning":"완성하다","group":"suru","base":{"text":"完成する","kana":"かんせいする"},"masu":{"text":"完成します","kana":"かんせいします"},"negative":{"text":"完成しない","kana":"かんせいしない"}},{"id":499,"meaning":"실패하다","group":"suru","base":{"text":"失敗する","kana":"しっぱいする"},"masu":{"text":"失敗します","kana":"しっぱいします"},"negative":{"text":"失敗しない","kana":"しっぱいしない"}},{"id":500,"meaning":"성공하다","group":"suru","base":{"text":"成功する","kana":"せいこうする"},"masu":{"text":"成功します","kana":"せいこうします"},"negative":{"text":"成功しない","kana":"せいこうしない"}}];
    const formLabels = {
      base: "기본형",
      masu: "ます형",
      negative: "부정형"
    };

    const state = {
      query: "",
      voice: null
    };

    const $ = (selector) => document.querySelector(selector);

    function normalize(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[\s　・·.]/g, "")
        .trim();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function highlight(value, query) {
      const safe = escapeHtml(value);
      const rawQuery = String(query || "").trim();
      if (!rawQuery) return safe;
      const compactValue = normalize(value);
      const compactQuery = normalize(rawQuery);
      if (!compactQuery || !compactValue.includes(compactQuery)) return safe;
      // 일본어/한글 검색은 조합형 문자가 섞일 수 있어 안전하게 전체 강조만 적용합니다.
      return '<span class="highlight">' + safe + '</span>';
    }


    function groupLabel(group) {
      if (group === "ichidan") return "2그룹동사";
      if (group === "suru" || group === "kuru") return "3그룹동사";
      return "1그룹동사";
    }

    function groupClass(group) {
      if (group === "ichidan") return "group-2";
      if (group === "suru" || group === "kuru") return "group-3";
      return "group-1";
    }

    function getSearchText(v) {
      return [
        v.id,
        v.meaning,
        groupLabel(v.group), v.group,
        v.base.text, v.base.kana,
        v.masu.text, v.masu.kana,
        v.negative.text, v.negative.kana
      ].join(" ");
    }

    function filteredVerbs() {
      const q = normalize(state.query);
      if (!q) return verbs;
      return verbs.filter((v) => normalize(getSearchText(v)).includes(q));
    }

    function isKanjiChar(char) {
      return /[\u3400-\u4DBF\u4E00-\u9FFF\uF900-\uFAFF々〆ヶ]/.test(char);
    }

    function splitJapaneseRuns(text) {
      const runs = [];
      let current = "";
      let currentType = "";
      Array.from(String(text || "")).forEach((char) => {
        const type = isKanjiChar(char) ? "kanji" : "other";
        if (type !== currentType && current) {
          runs.push({ type: currentType, value: current });
          current = "";
        }
        currentType = type;
        current += char;
      });
      if (current) runs.push({ type: currentType, value: current });
      return runs;
    }

    function findNextOtherRun(runs, startIndex) {
      for (let i = startIndex + 1; i < runs.length; i += 1) {
        if (runs[i].type === "other" && runs[i].value) return runs[i].value;
      }
      return "";
    }

    function rubyBlock(text, kana, className) {
      const rbClass = className === "main-ruby" ? "main-rb" : "form-rb";
      const runs = splitJapaneseRuns(text);
      if (!runs.some((run) => run.type === "kanji")) {
        return `<span class="${className}-line"><span class="${rbClass}">${highlight(text, state.query)}</span></span>`;
      }

      let kanaIndex = 0;
      const html = runs.map((run, index) => {
        if (run.type === "kanji") {
          const nextOther = findNextOtherRun(runs, index);
          let reading = "";
          if (nextOther) {
            const found = kana.indexOf(nextOther, kanaIndex);
            if (found >= kanaIndex) {
              reading = kana.slice(kanaIndex, found);
              kanaIndex = found;
            } else {
              reading = kana.slice(kanaIndex, kanaIndex + run.value.length);
              kanaIndex += reading.length;
            }
          } else {
            reading = kana.slice(kanaIndex);
            kanaIndex = kana.length;
          }
          return `<ruby class="${className}"><span class="${rbClass}">${highlight(run.value, state.query)}</span><rt>${highlight(reading, state.query)}</rt></ruby>`;
        }

        const literal = run.value;
        if (kana.slice(kanaIndex, kanaIndex + literal.length) === literal) {
          kanaIndex += literal.length;
        } else {
          const found = kana.indexOf(literal, kanaIndex);
          if (found >= kanaIndex) kanaIndex = found + literal.length;
        }
        return `<span class="${rbClass}">${highlight(literal, state.query)}</span>`;
      }).join("");

      return `<span class="${className}-line">${html}</span>`;
    }

    function formBlock(v, key) {
      const form = v[key];
      const label = formLabels[key];
      const aria = `${v.base.text} ${label} 발음 듣기`;
      return `
        <div class="form-cell" data-speak="${escapeHtml(form.kana)}" role="button" tabindex="0" aria-label="${escapeHtml(aria)}">
          <span class="label">${label}</span>
          ${rubyBlock(form.text, form.kana, "form-ruby")}
        </div>
      `;
    }

    function render() {
      const items = filteredVerbs();
      $("#resultText").innerHTML = `검색 결과 <strong>${items.length}</strong> / ${verbs.length}`;
      $("#topCounter").textContent = `${verbs.length}개`;
      $("#searchClearBtn").classList.toggle("show", state.query.length > 0);
      $("#emptyBox").classList.toggle("show", items.length === 0);
      $("#verbList").innerHTML = items.map((v) => `
        <article class="verb-card">
          <div class="card-head">
            <div class="main-word-wrap" data-speak="${escapeHtml(v.base.kana)}" role="button" tabindex="0" aria-label="${escapeHtml(v.base.text + ' 기본형 발음 듣기')}">
              ${rubyBlock(v.base.text, v.base.kana, "main-ruby")}
            </div>
            <div class="card-meta">
              <span class="card-no">${String(v.id).padStart(3, "0")}</span>
              <span class="group-pill ${groupClass(v.group)}">${groupLabel(v.group)}</span>
              <span class="card-meaning">${highlight(v.meaning, state.query)}</span>
            </div>
          </div>
          <div class="forms">
            ${formBlock(v, "base")}
            ${formBlock(v, "masu")}
            ${formBlock(v, "negative")}
          </div>
        </article>
      `).join("");
    }

    function pickJapaneseVoice() {
      const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      state.voice = voices.find((voice) => /^ja[-_]?JP/i.test(voice.lang)) || voices.find((voice) => /^ja/i.test(voice.lang)) || null;
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) {
        alert("이 브라우저에서는 음성 합성을 지원하지 않습니다.");
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "ja-JP";
      utterance.rate = 0.78;
      utterance.pitch = 1;
      if (state.voice) utterance.voice = state.voice;
      window.speechSynthesis.speak(utterance);
    }

    document.addEventListener("DOMContentLoaded", () => {
      pickJapaneseVoice();
      if ("speechSynthesis" in window) {
        window.speechSynthesis.onvoiceschanged = pickJapaneseVoice;
      }

      $("#searchBox").addEventListener("click", () => $("#searchInput").focus());
      $("#searchIconBtn").addEventListener("click", () => $("#searchInput").focus());
      $("#searchInput").addEventListener("input", (event) => {
        state.query = event.target.value;
        render();
      });
      $("#searchInput").addEventListener("compositionend", (event) => {
        state.query = event.target.value;
        render();
      });
      $("#searchClearBtn").addEventListener("click", () => {
        state.query = "";
        $("#searchInput").value = "";
        $("#searchInput").focus();
        render();
      });
      $("#verbList").addEventListener("click", (event) => {
        const cell = event.target.closest(".form-cell[data-speak], .main-word-wrap[data-speak]");
        if (!cell) return;
        event.preventDefault();
        speak(cell.dataset.speak);
      });

      $("#verbList").addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const cell = event.target.closest(".form-cell[data-speak], .main-word-wrap[data-speak]");
        if (!cell) return;
        event.preventDefault();
        speak(cell.dataset.speak);
      });

      render();
    });
  </script>
</body>
</html>
